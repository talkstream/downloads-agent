downloads_dir: ~/Downloads
archive_dir: ~/Downloads/Archive
inactive_days: 30
max_operations: 500
date_subfolder: true

categories:
  Documents:
    - pdf
    - docx
    - doc
    - txt
    - rtf
    - odt
    - pages
    - epub
    - mobi
    - xlsx
    - xls
    - csv
    - numbers
    - ods
    - pptx
    - ppt
    - key
    - odp
  Images:
    - jpg
    - jpeg
    - png
    - gif
    - bmp
    - tiff
    - tif
    - svg
    - webp
    - ico
    - heic
    - heif
    - raw
    - cr2
    - nef
  Videos:
    - mp4
    - mov
    - avi
    - mkv
    - wmv
    - flv
    - webm
    - m4v
    - mpg
    - mpeg
    - 3gp
  Audio:
    - mp3
    - ogg
    - m4a
    - wav
    - flac
    - aac
    - wma
    - aiff
    - opus
  Code:
    - py
    - js
    - ts
    - jsx
    - tsx
    - json
    - yaml
    - yml
    - xml
    - html
    - css
    - scss
    - sh
    - bash
    - zsh
    - rb
    - go
    - rs
    - java
    - kt
    - swift
    - c
    - cpp
    - h
    - sql
    - graphql
    - proto
    - toml
    - ini
    - cfg
    - conf
    - env
    - ipynb
    - r
    - rmd
  Archives:
    - zip
    - tar
    - gz
    - bz2
    - xz
    - rar
    - 7z
    - dmg
    - pkg
    - iso
    - img
    - deb
    - rpm
  Other: []

ignore_patterns:
  - .DS_Store
  - .localized
  - .Spotlight-V100
  - .Trashes
  - .fseventsd
  - .claude

ignore_dirs:
  - Archive
